<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nơ Coffee - Vibe Chill Coffee</title>
  
  <!-- Web Shortcut & App Installation Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="./src/assets/icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./src/assets/icon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./src/assets/icon.png">
  <link rel="manifest" href="./site.webmanifest">
  <meta name="apple-mobile-web-app-title" content="Nơ Coffee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <!-- App Stylesheets -->
  <link rel="stylesheet" href="./src/css/variables.css">
  <link rel="stylesheet" href="./src/css/main.css">
  <link rel="stylesheet" href="./src/css/components.css">
  <link rel="stylesheet" href="./src/css/views.css">
</head>
<body>

  <!-- App Main Viewport Wrapper simulating a mobile phone shell on desktop -->
  <div class="app-viewport-wrapper">
    <div class="app-layout">
      
      <!-- App Header -->
      <header class="app-header">
        <div class="header-logo">
          <span class="logo-icon">🎗️</span>
          <div class="logo-text">
            <h1>Nơ Coffee</h1>
            <div class="sub-logo">Vibe Chill Coffee</div>
          </div>
        </div>
        <div class="user-profile-badge" id="header-user-badge">
          <span class="role-dot" id="header-role-dot"></span>
          <span id="header-role-name">Khách</span>
        </div>
      </header>

      <!-- Viewport Content Area -->
      <main class="viewport-content" id="view-viewport">
        <!-- View Panels mounted dynamically -->
        <div id="login-view" class="view-panel hidden"></div>
        <div id="home-view" class="view-panel hidden"></div>
        <div id="pos-view" class="view-panel hidden"></div>
        <div id="inventory-view" class="view-panel hidden"></div>
        <div id="waste-view" class="view-panel hidden"></div>
        <div id="menu-view" class="view-panel hidden"></div>
        <div id="stats-view" class="view-panel hidden"></div>
      </main>

      <!-- Bottom Navigation Bar -->
      <nav class="app-nav hidden" id="bottom-nav-bar">
        <button class="nav-tab" data-view="home-view">
          <span class="tab-icon"><i class="bi bi-house-door-fill"></i></span>
          <span class="tab-label">Trang Chủ</span>
        </button>
        <button class="nav-tab" data-view="pos-view">
          <span class="tab-icon"><i class="bi bi-cart-fill"></i></span>
          <span class="tab-label">Bán Hàng</span>
        </button>
        <button class="nav-tab" data-view="inventory-view">
          <span class="tab-icon"><i class="bi bi-box-seam-fill"></i></span>
          <span class="tab-label">Kho</span>
        </button>
        <button class="nav-tab" data-view="waste-view">
          <span class="tab-icon"><i class="bi bi-trash-fill"></i></span>
          <span class="tab-label">Hao Hụt</span>
        </button>
        <button class="nav-tab" data-view="menu-view">
          <span class="tab-icon"><i class="bi bi-journal-text"></i></span>
          <span class="tab-label">Menu</span>
        </button>
        <button class="nav-tab" data-view="stats-view">
          <span class="tab-icon"><i class="bi bi-bar-chart-line-fill"></i></span>
          <span class="tab-label">Báo Cáo</span>
        </button>
      </nav>
      
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"></div>

    <!-- Fullscreen Network Database Sync Loader -->
    <div id="app-loading-overlay" class="loading-overlay hidden">
      <div class="loading-spinner-box">
        <div class="loading-icon-wrapper">
          <span class="spin-icon"><i class="bi bi-arrow-repeat"></i></span>
        </div>
        <div class="loading-text">Đang đồng bộ cơ sở dữ liệu...</div>
      </div>
    </div>

    <!-- Dev Console floating widgets -->
    <button class="dev-trigger-btn hidden" id="dev-float-trigger">
      <i class="bi bi-braces"></i>
    </button>

    <div class="dev-quick-panel hidden" id="dev-role-switcher">
      <div class="dev-panel-header">
        <span>CÔNG CỤ GIẢ LẬP</span>
        <button class="btn-icon-small" id="dev-panel-toggle" style="background: none; color: white; padding: 0;">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="dev-panel-body">
        <label class="dev-switch-label">
          <span>Bỏ qua Đăng nhập</span>
          <input type="checkbox" id="dev-bypass-login" checked>
        </label>
        
        <div style="font-size: 10px; color: var(--text-light); margin-top: 4px;">GIẢ LẬP VAI TRÒ</div>
        <div class="dev-role-btn-group">
          <button class="btn-dev-role active" data-role="dev-admin">Quản trị viên (Dev)</button>
          <button class="btn-dev-role" data-role="manager">Quản lý cửa hàng</button>
          <button class="btn-dev-role" data-role="employee">Nhân viên phục vụ</button>
        </div>

        <button class="btn-dev-action" id="dev-seed-btn">
          <i class="bi bi-database-fill-down"></i> Sinh dữ liệu 30 ngày
        </button>
      </div>
    </div>

  </div>

  <!-- Bootloader script -->
  <script type="module" src="./src/app.js"></script>
</body>
</html>
